name: Build Linux Bundles

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop-ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop-ui/src-tauri -> apps/desktop-ui/src-tauri/target

      - name: Install frontend dependencies
        working-directory: apps/desktop-ui
        run: npm ci

      - name: Build Tauri bundles (.deb + .AppImage)
        working-directory: apps/desktop-ui
        run: npm run tauri:build -- --bundles deb,appimage

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spotlight-linux-bundles
          path: |
            apps/desktop-ui/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop-ui/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Publish GitHub Release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop-ui/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop-ui/src-tauri/target/release/bundle/appimage/*.AppImage
          generate_release_notes: true
